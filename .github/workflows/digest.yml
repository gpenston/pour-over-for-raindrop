name: Raindrop Digest

on:
  schedule:
    # Current: Every other day (Mon, Wed, Fri, Sun) at 8:00 AM Pacific
    - cron: '0 15 * * 0,1,3,5'
    
    # Other schedule options (comment out current, uncomment desired):
    # Daily:
    # - cron: '0 15 * * *'
    
    # 3x per week (Mon, Wed, Fri):
    # - cron: '0 15 * * 1,3,5'
    
    # Weekly on Monday mornings:
    # - cron: '0 15 * * 1'
    
    # Twice a week (Monday & Thursday):
    # - cron: '0 15 * * 1,4'
    
  workflow_dispatch: # Allows manual trigger from GitHub Actions tab

jobs:
  send-digest:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: raindrop-digest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
      
      - name: Install dependencies
        run: npm ci
      
      - name: Run digest script
        env:
          COLLECTION_ID: ${{ secrets.COLLECTION_ID }}
          ARCHIVE_ID: ${{ secrets.ARCHIVE_ID }}
          RAINDROP_TOKEN: ${{ secrets.RAINDROP_TOKEN }}
          PERPLEXITY_API_KEY: ${{ secrets.PERPLEXITY_API_KEY }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          AI_PROVIDER: ${{ secrets.AI_PROVIDER }}
          SMTP_USER: ${{ secrets.SMTP_USER }}
          SMTP_PASS: ${{ secrets.SMTP_PASS }}
          FROM_EMAIL: ${{ secrets.FROM_EMAIL }}
          TO_EMAIL: ${{ secrets.TO_EMAIL }}
        run: node raindrop-digest.js
