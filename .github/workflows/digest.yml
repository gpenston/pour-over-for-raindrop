name: Daily Raindrop Digest

on:
  schedule:
    - cron: '0 15 * * *'  # daily at 15:00 UTC
  workflow_dispatch:

jobs:
  send-digest:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - name: Set up Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '20'
      - name: Install dependencies
        run: npm install        # <--- changed from `npm ci`
      - name: Run digest script
        run: node raindrop-digest.js
        env:
          COLLECTION_ID: ${{ secrets.COLLECTION_ID }}
          RAINDROP_TOKEN: ${{ secrets.RAINDROP_TOKEN }}
          SMTP_USER:      ${{ secrets.SMTP_USER }}
          SMTP_PASS:      ${{ secrets.SMTP_PASS }}
          FROM_EMAIL:     ${{ secrets.FROM_EMAIL }}
          TO_EMAIL:       ${{ secrets.TO_EMAIL }}
