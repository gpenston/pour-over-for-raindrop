name: Daily Raindrop Digest

on:
  schedule:
    # Runs daily at 15:00 UTC (7 AM PDT)
    - cron: '0 15 * * *'
  workflow_dispatch:

jobs:
  send-digest:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - name: Set up Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '20'
      - name: Install dependencies
        run: npm install
      - name: Run digest script
        run: node raindrop-digest.js
        env:
          COLLECTION_ID:    ${{ secrets.COLLECTION_ID }}
          ARCHIVE_ID:       ${{ secrets.ARCHIVE_ID }}
          RAINDROP_TOKEN:   ${{ secrets.RAINDROP_TOKEN }}
          OPENAI_API_KEY:   ${{ secrets.OPENAI_API_KEY }}
          SMTP_USER:        ${{ secrets.SMTP_USER }}
          SMTP_PASS:        ${{ secrets.SMTP_PASS }}
          FROM_EMAIL:       ${{ secrets.FROM_EMAIL }}
          TO_EMAIL:         ${{ secrets.TO_EMAIL }}
